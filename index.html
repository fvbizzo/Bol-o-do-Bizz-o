<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão do Bizzão - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

    <div class="login-wrapper">
        
        <div class="video-side">
            <video autoplay muted loop playsinline class="side-video">
                <source src="download.mp4" type="video/mp4">
            </video>
        </div>

        <div class="login-container">
            <h1>Bolão do Bizzão ⚽</h1>

            <div id="area-login">
                <div class="form-grupo">
                    <input type="email" id="email" placeholder="E-mail">
                    <input type="password" id="senha" placeholder="Senha">
                    <button id="btn-login">Entrar</button>
                </div>
                <p>Não tem conta? <a href="#" id="ir-para-cadastro">Cadastre-se</a></p>
            </div>

            <div id="area-cadastro" style="display: none;">
                <div class="form-grupo">
                    <input type="text" id="cad-nome" placeholder="Seu Nome Completo">
                    <input type="email" id="cad-email" placeholder="E-mail">
                    <input type="password" id="cad-senha" placeholder="Crie uma Senha">
                    <button id="btn-cadastrar">Criar Minha Conta</button>
                </div>
                <p>Já tem conta? <a href="#" id="ir-para-login">Fazer Login</a></p>
            </div>
        </div>

        <div class="video-side">
            <video autoplay muted loop playsinline class="side-video">
                <source src="download.mp4" type="video/mp4">
            </video>
        </div>

    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
