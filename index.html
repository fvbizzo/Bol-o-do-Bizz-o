<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão da Copa do Bizzão</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-container">
        <h1 id="titulo-tela">Bolão da Copa ⚽</h1>
        <p id="subtitulo-tela">Faça login para dar seus palpites!</p>
        
        <form id="auth-form">
            <div class="input-group" id="group-nome" style="display: none;">
                <label for="nome">Seu Nome ou Apelido</label>
                <input type="text" id="nome" placeholder="Como quer ser chamado?">
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            
            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="********" required>
            </div>
            
            <button type="submit" id="btn-principal">Entrar no Bolão</button>
        </form>
        
        <p class="register-link">
            <span id="texto-alternar">Ainda não tem conta?</span> 
            <a href="#" id="link-alternar">Cadastre-se aqui</a>
        </p>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
